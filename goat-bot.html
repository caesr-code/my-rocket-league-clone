<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rocket Arena GOAT Bot</title>
<style>
:root{color-scheme:dark}*{box-sizing:border-box}body{margin:0;min-height:100vh;display:grid;place-items:center;background:radial-gradient(circle at top,#173560,#050914 58%);font-family:system-ui,-apple-system,Segoe UI,sans-serif;color:#fff}.card{width:min(92vw,620px);padding:34px;border:1px solid #57dcff55;border-radius:26px;background:#07101eea;box-shadow:0 24px 90px #000a;text-align:center}h1{margin:0 0 8px;font-size:clamp(32px,7vw,64px);letter-spacing:-.05em}.tag{color:#6de7ff;font-weight:900;letter-spacing:.16em}.status{margin:24px 0;padding:16px;border-radius:16px;background:#ffffff0b;font-size:20px;font-weight:800}.on{color:#5dff9a}.off{color:#ff758d}button{width:100%;padding:19px;margin-top:12px;border:0;border-radius:16px;font-size:20px;font-weight:1000;cursor:pointer}#toggle{background:linear-gradient(135deg,#4fe1ff,#7dff9f);color:#03101a}#ping{background:#ffffff12;color:#fff;border:1px solid #ffffff22}.small{margin-top:20px;color:#aab7ca;line-height:1.5}code{color:#7eeeff}.warn{color:#ffd56a}
</style>
</head>
<body><main class="card"><div class="tag">ROCKET ARENA</div><h1>GOAT BOT</h1><div id="status" class="status">Checking status…</div><button id="toggle">ENGAGE GOAT BOT</button><button id="ping">CHECK GAME CONNECTION</button><div class="small">Keep the game open in another tab on the <b>same GitHub Pages site</b>. This controls offline Solo and Solo 2v2. Press <code>G</code> in-game as a backup toggle.</div><div id="note" class="small warn"></div></main>
<script>
const KEY='rocketArenaGoatBotEnabled',CHANNEL='rocket-arena-goat-bot-v1';
let enabled=localStorage.getItem(KEY)==='1',connected=false;
const status=document.getElementById('status'),toggle=document.getElementById('toggle'),note=document.getElementById('note');
let bc;try{bc=new BroadcastChannel(CHANNEL);bc.onmessage=e=>{if(e.data?.type==='status'){connected=true;enabled=!!e.data.enabled;render();note.textContent=`Connected • ${e.data.mode||'unknown mode'} • ${e.data.gameState||'unknown state'}`}}}catch(e){note.textContent='BroadcastChannel is unavailable in this browser.'}
function render(){status.textContent=enabled?'GOAT BOT: ENGAGED':'GOAT BOT: OFF';status.className='status '+(enabled?'on':'off');toggle.textContent=enabled?'DISENGAGE GOAT BOT':'ENGAGE GOAT BOT'}
function set(v){enabled=v;localStorage.setItem(KEY,v?'1':'0');try{bc?.postMessage({type:'set',enabled:v})}catch(_){}render();note.textContent='Command sent to the open Rocket Arena tab.'}
toggle.onclick=()=>set(!enabled);document.getElementById('ping').onclick=()=>{connected=false;note.textContent='Looking for the game tab…';try{bc?.postMessage({type:'ping'})}catch(_){}setTimeout(()=>{if(!connected)note.textContent='No updated game tab answered. Upload this file beside the updated index.html, then refresh the game.'},800)};
addEventListener('storage',e=>{if(e.key===KEY){enabled=e.newValue==='1';render()}});render();setTimeout(()=>{try{bc?.postMessage({type:'ping'})}catch(_){}},100);
</script></body></html>
